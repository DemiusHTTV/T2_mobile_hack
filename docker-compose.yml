services:
  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "0"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: "/data/db.sqlite3"
    volumes:
      - backend_data:/data
    ports:
      - "3001:3000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  backend_data:
