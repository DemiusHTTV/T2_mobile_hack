<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSheet | WorkSpace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="empl.css">
</head>
<body>

    <div class="app-container">
        <div class="sidebar-overlay" id="overlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="logo-sidebar">SMARTSHEET</div>
            <nav class="menu">
                <a href="#" class="menu-link active" data-target="schedule">Мой график</a>
                <a href="#" class="menu-link" data-target="team">Команда</a>
                <a href="#" class="menu-link" data-target="settings">Настройки</a>
                <a href="#" class="menu-link" data-target="rating">Рейтинг</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="burger-menu" id="burger-btn">
                    <span></span><span></span><span></span>
                </div>
                <h1 class="page-title" id="main-title">Апрель 2026</h1>
                <div class="mobile-welcome">Привет, Дмитрий!</div>
                <div class="user-info">
                    <span class="user-name-desktop">Привет, Дмитрий!</span>
                    <div class="user-avatar">ДТ</div>
                </div>
            </header>

            <section class="content-section active" id="schedule">
                <div class="calendar-wrapper">
                    <div class="calendar-grid" id="calendar-grid">
                        <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
                    </div>
                </div>
            </section>

            <section class="content-section" id="team"><div class="placeholder-card"><h2>Команда</h2></div></section>
            <section class="content-section" id="settings"><div class="placeholder-card"><h2>Настройки</h2></div></section>
            <section class="content-section" id="rating"><div class="placeholder-card"><h2>Рейтинг</h2></div></section>
        </main>
    </div>

    <div class="modal-overlay" id="modal-shift">
        <div class="modal-card">
            <button class="modal-close" id="close-modal">×</button>
            <h2 id="modal-date-text">Смена: 12 апреля</h2>
            <div class="modal-info">
                <p><strong>Время:</strong> 08:00 — 20:00</p>
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="btn-need-sub">Нужна подмена</button>
                <button class="btn-primary" id="btn-confirm-shift">Подтвердить</button>
            </div>
        </div>
    </div>

    <div class="chat-overlay" id="chat-bot">
        <div class="chat-window">
            <div class="chat-header">
                <span class="chat-title">Поиск подмены</span>
                <button id="close-chat" class="chat-close-btn">×</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="msg bot">Привет! Напиши причину подмены.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Сообщение..."><button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('calendar-grid');
        const modal = document.getElementById('modal-shift');
        const chatBot = document.getElementById('chat-bot');
        const chatMessages = document.getElementById('chat-messages');
        const burger = document.getElementById('burger-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const closeChat = document.getElementById('close-chat');
        let selectedDayCell = null;

        // Календарь (31 день)
        for(let i=0; i<3; i++) grid.innerHTML += '<div class="day-cell empty"></div>';
        for(let d=1; d<=31; d++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if(d % 4 === 0) cell.classList.add('has-shift');
            cell.innerHTML = `<span>${d}</span>${d % 4 === 0 ? '<span class="shift-tag">СМЕНА</span>' : ''}`;
            cell.onclick = () => {
                selectedDayCell = cell;
                document.getElementById('modal-date-text').textContent = `Смена: ${d} апреля`;
                modal.classList.add('show');
            };
            grid.appendChild(cell);
        }

        // Бургер-меню
        function toggleMenu() {
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
            burger.classList.toggle('hidden-burger');
        }
        burger.onclick = toggleMenu;
        overlay.onclick = toggleMenu;

        // Навигация
        document.querySelectorAll('.menu-link').forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(link.getAttribute('data-target')).classList.add('active');
                if(window.innerWidth <= 768) toggleMenu();
            };
        });

        // Модалка и Чат
        document.getElementById('close-modal').onclick = () => modal.classList.remove('show');
        document.getElementById('btn-confirm-shift').onclick = () => {
            selectedDayCell.className = 'day-cell work-day';
            selectedDayCell.querySelector('.shift-tag').textContent = 'ПРИНЯТО';
            modal.classList.remove('show');
        };
        document.getElementById('btn-need-sub').onclick = () => {
            modal.classList.remove('show');
            chatBot.classList.add('show');
        };
        closeChat.onclick = () => chatBot.classList.remove('show');
        
        document.getElementById('send-btn').onclick = function() {
            const val = document.getElementById('user-input').value.trim();
            if(!val) return;
            const uM = document.createElement('div'); uM.className = 'msg user'; uM.textContent = val;
            chatMessages.appendChild(uM);
            document.getElementById('user-input').value = '';
            setTimeout(() => {
                const bM = document.createElement('div'); bM.className = 'msg bot'; bM.textContent = 'Ок, ищу замену!';
                chatMessages.appendChild(bM);
                if(selectedDayCell) {
                    selectedDayCell.className = 'day-cell on-wait';
                    selectedDayCell.querySelector('.shift-tag').textContent = 'ПОИСК...';
                }
                setTimeout(() => chatBot.classList.remove('show'), 1500);
            }, 800);
        };
    </script>
</body>
</html>
